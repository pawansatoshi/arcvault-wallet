<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>ArcVault | Modular OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --arc-main: #00FFA3; --arc-sec: #0075FF; --bg-panel: rgba(255, 255, 255, 0.03); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; color: #fff; 
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #000 60%);
            min-height: 100vh; overflow-x: hidden;
        }
        .glass { background: var(--bg-panel); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .arc-btn-gradient { background: linear-gradient(135deg, var(--arc-main) 0%, var(--arc-sec) 100%); transition: 0.2s; }
        .arc-btn-gradient:active { transform: scale(0.96); filter: brightness(1.1); }
        .text-gradient { background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        input:focus, select:focus { border-color: var(--arc-main); }
        select option { background: #111; color: #fff; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-8">

    <audio id="bg-music" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
    </audio>

    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black fade-in">
        <img src="logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Arc_logo.svg/1024px-Arc_logo.svg.png'" class="w-24 h-24 mb-6 rounded-2xl shadow-[0_0_40px_rgba(0,255,163,0.2)]" alt="Logo">
        <h1 class="text-4xl font-extrabold text-gradient mb-8">ArcVault</h1>
        <button onclick="startExperience()" class="py-4 px-10 arc-btn-gradient rounded-full text-black font-black tracking-widest uppercase animate-pulse">Initialize OS</button>
    </div>

    <div id="auth-ui" class="hidden w-full max-w-sm space-y-4 fade-in">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold tracking-tighter text-gradient">ArcVault</h1>
            <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mt-1">Identity Layer</p>
        </div>
        <div class="glass rounded-[38px] p-7 space-y-3 shadow-2xl">
            <button onclick="login('google')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/5">Sign in with Google</button>
            <button onclick="login('twitter')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/5 text-gray-300">Sign in with X</button>
            <button onclick="login('github')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/5 text-gray-400">Sign in with GitHub</button>
            <div class="flex items-center space-x-3 py-2"><div class="h-[1px] flex-1 bg-white/10"></div><span class="text-[9px] text-gray-600 uppercase">OR</span><div class="h-[1px] flex-1 bg-white/10"></div></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="signInEmail()" class="py-3 bg-white/5 rounded-2xl text-xs font-bold text-emerald-400">Sign In (Email)</button>
                <button onclick="signUpEmail()" class="py-3 bg-white/5 rounded-2xl text-xs font-bold text-blue-400">Create Account</button>
            </div>
        </div>
    </div>

    <div id="wallet-ui" class="hidden w-full max-w-md space-y-4 fade-in pb-10">
        
        <div class="flex justify-between items-center px-2 mb-2">
            <select id="network-selector" onchange="changeNetwork()" class="bg-transparent border-none text-emerald-400 font-bold text-[11px] uppercase tracking-wider w-auto py-1 px-0 cursor-pointer focus:ring-0">
                <option value="arc">Arc Testnet (Default)</option>
                <option value="eth">Ethereum Mainnet</option>
                <option value="base">Base</option>
                <option value="custom">+ Add Custom Network</option>
            </select>
            
            <div class="flex items-center space-x-4">
                <button id="music-btn" onclick="toggleMusic()" class="text-lg">🎵</button>
                <button onclick="openWhitelist()" class="text-lg">📒</button>
                <button onclick="logoutApp()" class="text-lg text-red-400">🚪</button>
            </div>
        </div>

        <div class="glass rounded-[48px] p-8 text-center relative shadow-2xl">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em] mb-2">Total Portfolio Value</p>
            <h2 class="text-5xl font-extrabold tracking-tighter italic mb-6">$0.00</h2>
            <div class="bg-black/40 border border-white/5 p-3 rounded-2xl w-full mb-4 flex justify-between items-center cursor-pointer hover:bg-black/60" onclick="copyElement('wallet-address')">
                <p id="wallet-address" class="text-[10px] font-mono text-gray-400 truncate w-full text-left mr-2">Loading vault...</p>
                <span class="text-xs">📋</span>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="openSendModal()" class="py-4 arc-btn-gradient text-black font-black rounded-[24px] text-sm uppercase">Send</button>
                <button onclick="openReceiveModal()" class="py-4 glass font-black rounded-[24px] text-sm uppercase hover:bg-white/5">Receive</button>
            </div>
        </div>

        <div class="glass rounded-3xl p-5">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Assets</h3>
                <button onclick="openAddTokenModal()" class="text-[10px] text-emerald-400 font-bold uppercase hover:text-white">+ Add Token</button>
            </div>
            
            <div class="flex justify-between items-center p-3 bg-white/5 rounded-2xl mb-2 border border-blue-500/20">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400 font-bold text-xs">USDC</div>
                    <div class="text-left"><p class="text-sm font-bold">USD Coin</p><p class="text-[10px] text-gray-500">Official</p></div>
                </div>
                <p class="font-mono text-sm">0.00</p>
            </div>
            
            <div class="flex justify-between items-center p-3 bg-white/5 rounded-2xl">
                <div class="flex items-center space-x-3">
                    <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 font-bold text-xs">ARC</div>
                    <div class="text-left"><p class="text-sm font-bold">Arc Network</p><p class="text-[10px] text-gray-500">Native</p></div>
                </div>
                <p class="font-mono text-sm">0.00</p>
            </div>
        </div>

        <div class="glass rounded-3xl p-5">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Identity & Security</h3>
            
            <div id="active-connections" class="space-y-2 mb-4">
                </div>

            <div class="grid grid-cols-2 gap-2 pt-2 border-t border-white/5">
                <button onclick="linkAccount('google')" class="py-2 bg-white/5 rounded-xl text-[10px] font-bold hover:bg-white/10">+ Bind Google</button>
                <button onclick="linkAccount('twitter')" class="py-2 bg-white/5 rounded-xl text-[10px] font-bold hover:bg-white/10">+ Bind X</button>
                <button onclick="linkAccount('github')" class="py-2 bg-white/5 rounded-xl text-[10px] font-bold hover:bg-white/10">+ Bind GitHub</button>
                <button onclick="linkEmailAccount()" class="py-2 bg-white/5 border border-emerald-500/30 rounded-xl text-[10px] font-bold hover:bg-white/10 text-emerald-400">+ Bind Email</button>
            </div>
        </div>
    </div>

    <div id="error-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 fade-in">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full text-center border border-red-500/50 bg-red-900/10">
            <div class="w-16 h-16 bg-red-500/20 text-red-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">⚠️</div>
            <h3 class="text-xl font-black mb-2 text-white">System Error</h3>
            <p id="error-msg" class="text-xs text-red-300 mb-4 bg-red-900/40 p-3 rounded-xl border border-red-500/20"></p>
            <p id="error-solution" class="text-[11px] text-gray-300 mb-6"></p>
            <button onclick="closeModal('error-modal')" class="w-full py-4 bg-white/10 hover:bg-white/20 text-white font-black rounded-2xl">Acknowledge</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, TwitterAuthProvider, GithubAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut, EmailAuthProvider, linkWithCredential, linkWithPopup, unlink } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzARRpSAQfoFryH4hGQem32kQ5XqEEmQI",
            authDomain: "arcvault-cc843.firebaseapp.com",
            projectId: "arcvault-cc843",
            appId: "1:524225470861:web:f69d672925effc78d11dc4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 🗣️ AI VOICE ENGINE WITH MUSIC DUCKING ---
        let synth = window.speechSynthesis;
        let isMusicPlaying = true;
        const bgm = document.getElementById('bg-music');

        window.toggleMusic = () => {
            isMusicPlaying = !isMusicPlaying;
            document.getElementById('music-btn').innerText = isMusicPlaying ? "🎵" : "🔇";
            if(isMusicPlaying) bgm.play(); else bgm.pause();
        };

        window.playCustomVoice = function(text) {
            if (!synth) return;
            synth.cancel(); 
            
            // DUCK MUSIC
            if(isMusicPlaying) bgm.pause();

            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.85; msg.pitch = 1.0;
            const voices = synth.getVoices();
            msg.voice = voices.find(v => v.name.includes('Female') || v.name.includes('UK')) || voices[0];
            
            // RESUME MUSIC ON END
            msg.onend = () => { if(isMusicPlaying) bgm.play().catch(()=>{}); };
            
            synth.speak(msg);
        };

        window.showError = (msg, solution) => {
            document.getElementById('error-modal').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('error-solution').innerText = "Solution: " + solution;
            playCustomVoice("System Error. " + msg);
        };

        // --- IDENTITY MANAGEMENT (DYNAMIC BINDING) ---
        function renderLinkedAccounts() {
            const user = auth.currentUser;
            if (!user) return;
            const container = document.getElementById('active-connections');
            container.innerHTML = '';

            user.providerData.forEach((profile) => {
                let providerName = profile.providerId.split('.')[0].toUpperCase();
                if(providerName === 'PASSWORD') providerName = 'EMAIL';
                const details = profile.email || profile.displayName || profile.uid;

                container.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/10">
                        <div class="flex items-center space-x-2">
                            <span class="text-[10px] font-black text-emerald-400 bg-emerald-500/20 px-2 py-1 rounded">${providerName}</span>
                            <span class="text-xs text-gray-300 truncate w-32">${details}</span>
                        </div>
                        <button onclick="unlinkAccount('${profile.providerId}')" class="text-[10px] bg-red-500/20 text-red-400 px-3 py-1 rounded hover:bg-red-500/40 transition">Disconnect</button>
                    </div>
                `;
            });
        }

        window.unlinkAccount = async (providerId) => {
            if(auth.currentUser.providerData.length === 1) {
                return showError("Cannot disconnect your only login method.", "Add another login method first.");
            }
            if(!confirm("Are you sure you want to disconnect this account?")) return;
            
            try {
                await unlink(auth.currentUser, providerId);
                playCustomVoice("Identity layer successfully unlinked.");
                renderLinkedAccounts();
            } catch (e) { showError(e.message, "Try refreshing the application."); }
        };

        window.linkAccount = async (pName) => {
            playCustomVoice(`Initializing bind protocol for ${pName}.`);
            let p = pName === 'google' ? new GoogleAuthProvider() : pName === 'twitter' ? new TwitterAuthProvider() : new GithubAuthProvider();
            try {
                await linkWithPopup(auth.currentUser, p);
                playCustomVoice(`${pName} successfully bound.`);
                renderLinkedAccounts();
            } catch (e) { showError(e.message, "Account may already be linked to another vault."); }
        };

        // --- START EXPERIENCE ---
        window.startExperience = () => {
            document.getElementById('splash-screen').classList.add('hidden');
            bgm.volume = 0.15;
            if(isMusicPlaying) bgm.play().catch(()=>{});
            
            playCustomVoice("Arc Protocol initialized. Awaiting secure login.");
            
            onAuthStateChanged(auth, (user) => {
                if (user) { showWallet(user); } 
                else { document.getElementById('auth-ui').classList.remove('hidden'); }
            });
        };

        // --- AUTH (Abbreviated, utilizes same functions as previous build) ---
        window.login = async (pName) => { /* logic */ };
        window.signInEmail = async () => { /* logic */ };
        window.logoutApp = async () => { await signOut(auth); location.reload(); };

        // --- WALLET INITIALIZER ---
        async function showWallet(user) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('wallet-ui').classList.remove('hidden');
            renderLinkedAccounts(); // Render the bonded identities immediately

            try {
                const userRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userRef);

                if (userDoc.exists() && userDoc.data().walletAddress) {
                    document.getElementById('wallet-address').innerText = userDoc.data().walletAddress;
                    playCustomVoice("Vault unlocked. Welcome back.");
                } else {
                    playCustomVoice("Generating new secure smart account. Please wait.");
                    const res = await fetch('/api/wallet', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: user.uid, action: 'create' }) });
                    const d = await res.json();
                    if (d.data && d.data.wallets) {
                        const newAddress = d.data.wallets[0].address;
                        await setDoc(userRef, { walletAddress: newAddress }, { merge: true });
                        document.getElementById('wallet-address').innerText = newAddress;
                        playCustomVoice("Vault generated and permanently secured.");
                    }
                }
            } catch (err) { showError("Database connection failed.", "Check Firebase Test Mode."); }
        }

        // --- UI UTILS ---
        window.copyElement = (id) => { navigator.clipboard.writeText(document.getElementById(id).innerText); playCustomVoice("Copied to clipboard."); };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.changeNetwork = () => {
            const val = document.getElementById('network-selector').value;
            if(val === 'custom') {
                showError("Custom RPC Addition Locked.", "This feature requires a premium architect license.");
                document.getElementById('network-selector').value = 'arc';
            } else {
                playCustomVoice("Network switched successfully.");
            }
        };
        window.openAddTokenModal = () => {
            showError("Token Search Locked.", "Official API search requires Mainnet connectivity.");
        };
    </script>
</body>
</html>
