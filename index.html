<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcVault | Secure Modular Wallet</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #00d2ff;
            --success: #3aebaf;
            --error: #ff4d4d;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container { width: 92%; max-width: 400px; }

        .wallet-card {
            background: var(--card);
            border-radius: 28px;
            padding: 35px 20px;
            border: 1px solid #222;
            text-align: center;
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 10px;
            color: var(--success);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .status-badge::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
        }

        .balance-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 52px; font-weight: 800; margin: 15px 0; }

        #diagnostic-log {
            display: none;
            background: rgba(255, 77, 77, 0.08);
            border: 1px solid var(--error);
            border-radius: 14px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            font-family: monospace;
            font-size: 11px;
            color: var(--error);
            word-break: break-all;
        }

        .address-display {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            color: #aaa;
            margin-top: 20px;
            border: 1px dashed #333;
            min-height: 40px;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn {
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.97); }
        .btn-main { background: linear-gradient(to right, var(--accent), var(--success)); color: #000; }
        .btn-alt { background: #1a1a1a; color: white; border: 1px solid #333; }

        #auth-btn {
            background: white; color: black; padding: 12px 24px; 
            border-radius: 12px; font-weight: 700; margin-top: 30px; 
            width: 100%; border: none; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-card">
        <div class="status-badge" id="status-tag">ARC NETWORK</div>
        <div class="balance-label">Smart Account Balance</div>
        <div class="balance-amount">$0.00</div>
        
        <div id="loader-text" style="color: var(--accent); font-size: 12px; font-weight: 600;">System Ready</div>

        <div id="diagnostic-log">
            <strong style="color: white;">🛰️ Node Diagnostic:</strong>
            <div id="diag-msg" style="margin-top: 6px;">Initializing protocol...</div>
        </div>

        <div class="address-display" id="wallet-addr">Login to view address</div>
    </div>

    <div class="btn-row">
        <button class="btn btn-main">SEND</button>
        <button class="btn btn-alt">RECEIVE</button>
    </div>

    <button id="auth-btn" onclick="startLogin()">LOGIN WITH X (TWITTER)</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<script>
    // 🛠️ FIREBASE CONFIGURATION (Verified arcvault-cc843)
    const firebaseConfig = {
        apiKey: "AIzaSyCzARRpSAQfoFryH4hGQem32kQ5XqEEmQI",
        authDomain: "arcvault-cc843.firebaseapp.com",
        projectId: "arcvault-cc843",
        storageBucket: "arcvault-cc843.appspot.com",
        messagingSenderId: "524225470861",
        appId: "1:524225470861:web:f69d672925effc78d11dc4"
    };
    
    firebase.initializeApp(firebaseConfig);

    async function startLogin() {
        const provider = new firebase.auth.TwitterAuthProvider();
        try {
            const result = await firebase.auth().signInWithPopup(provider);
            document.getElementById('auth-btn').style.display = 'none';
            initArcWallet(result.user);
        } catch (err) {
            triggerDiagnostic("Auth Fail", err.message);
        }
    }

    async function initArcWallet(user) {
        const log = document.getElementById('diagnostic-log');
        const msg = document.getElementById('diag-msg');
        const loader = document.getElementById('loader-text');

        log.style.display = "block";
        msg.innerText = "Connecting to Arc Vault Backend via Vercel...";
        loader.innerText = "Securing Connection...";

        try {
            const response = await fetch('/api/wallet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.uid, action: 'create' })
            });

            const result = await response.json();

            if (!response.ok) {
                console.error("Architect Debug:", result);
                msg.innerHTML = `
                    <span style="color:white">HTTP Status:</span> ${response.status}<br>
                    <span style="color:white">Circle Error Code:</span> ${result.code || 'N/A'}<br>
                    <span style="color:white">Message:</span> ${result.message || JSON.stringify(result)}
                `;
                loader.innerText = "Protocol Connection Error";
                loader.style.color = "#ff4d4d";
                return;
            }

            // SUCCESS - Extracting Wallet Data
            if (result.data && result.data.wallets && result.data.wallets.length > 0) {
                const address = result.data.wallets[0].address;
                document.getElementById('wallet-addr').innerText = address;
                log.style.display = "none";
                loader.innerText = "ARC LIVE";
                loader.style.color = "#3aebaf";
                document.getElementById('status-tag').innerText = "CONNECTED";
            } else {
                triggerDiagnostic("Malformed Data", "Response received but no address found.");
            }

        } catch (err) {
            triggerDiagnostic("Network Crash", err.message);
        }
    }

    function triggerDiagnostic(type, text) {
        const log = document.getElementById('diagnostic-log');
        const msg = document.getElementById('diag-msg');
        log.style.display = "block";
        msg.innerHTML = `<strong>${type}:</strong> ${text}`;
    }
</script>

</body>
</html>
