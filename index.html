<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>ArcVault | Modular Social Wallet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --arc-main: #00FFA3; --arc-sec: #0075FF; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; 
            color: #fff; 
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #000 60%);
            min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .arc-btn-gradient { background: linear-gradient(135deg, var(--arc-main) 0%, var(--arc-sec) 100%); transition: 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .arc-btn-gradient:active { transform: scale(0.96); filter: brightness(1.1); }
        .text-gradient { background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modal Background */
        .modal-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-8">

    <div id="app-header" class="mb-10 text-center fade-in">
        <h1 class="text-4xl font-extrabold tracking-tighter text-gradient">ArcVault</h1>
        <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-emerald-400 mt-2">Architect Protocol v1.0</p>
    </div>

    <div id="auth-ui" class="w-full max-w-sm space-y-4 fade-in">
        <div class="glass rounded-[38px] p-7 space-y-3 shadow-2xl">
            <button onclick="login('google')" class="w-full py-4 glass rounded-2xl flex items-center justify-center space-x-3 active:scale-95 transition-all group">
                <span class="font-bold text-sm tracking-tight group-hover:text-white">Sign in with Google</span>
            </button>
            <button onclick="login('twitter')" class="w-full py-4 glass rounded-2xl flex items-center justify-center space-x-3 active:scale-95 transition-all group">
                <span class="font-bold text-sm tracking-tight group-hover:text-white text-gray-300">Sign in with X</span>
            </button>
            <button onclick="login('github')" class="w-full py-4 glass rounded-2xl flex items-center justify-center space-x-3 active:scale-95 transition-all group">
                <span class="font-bold text-sm tracking-tight group-hover:text-white text-gray-400">Developer Login (GitHub)</span>
            </button>
            <div class="flex items-center space-x-3 py-2">
                <div class="h-[1px] flex-1 bg-white/10"></div>
                <span class="text-[9px] font-black text-gray-600 uppercase">OR</span>
                <div class="h-[1px] flex-1 bg-white/10"></div>
            </div>
            <button onclick="loginEmailPhone()" class="w-full py-4 bg-white/5 border border-white/5 rounded-2xl flex items-center justify-center space-x-3 active:scale-95 transition-all">
                <span class="font-bold text-xs text-emerald-500/80 tracking-widest uppercase">Email or Mobile</span>
            </button>
        </div>
    </div>

    <div id="wallet-ui" class="hidden w-full max-w-md space-y-6 fade-in">
        <div class="glass rounded-[48px] p-10 text-center relative overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.5)]">
            <div class="absolute top-6 right-8 flex items-center space-x-1">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                <span class="text-[9px] font-black text-emerald-400 tracking-tighter uppercase">Arc Live</span>
            </div>
            
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em] mb-3">Modular Smart Account</p>
            <h2 class="text-6xl font-extrabold tracking-tighter italic mb-8">$0.00</h2>

            <div id="diagnostic-log" class="hidden mb-4 bg-red-500/10 border border-red-500/30 rounded-2xl p-4 text-left font-mono text-[11px] text-red-400 break-all">
                <strong class="text-white">🛰️ Node Diagnostic:</strong>
                <div id="diag-msg" class="mt-2">Initializing protocol...</div>
            </div>

            <div class="bg-black/40 border border-white/5 p-4 rounded-3xl inline-block max-w-full">
                <p id="wallet-address" class="text-[10px] font-mono text-gray-400 break-all leading-tight">Securing your smart vault...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="playMetroVoice('Send module currently locked for testing.')" class="py-7 arc-btn-gradient text-black font-black rounded-[32px] text-xl shadow-[0_15px_35px_rgba(0,255,163,0.25)] uppercase tracking-tighter">Send</button>
            <button onclick="openReceiveModal()" class="py-7 glass font-black rounded-[32px] text-xl uppercase tracking-tighter active:scale-95 transition-transform">Receive</button>
        </div>

        <div class="glass rounded-3xl p-6 mt-4">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Security: Bind Accounts</h3>
            <p class="text-[10px] text-gray-500 mb-4">Link backup accounts so you never lose access to your vault.</p>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="linkAccount('google')" class="py-2 bg-white/5 rounded-xl text-xs font-bold hover:bg-white/10">Google</button>
                <button onclick="linkAccount('twitter')" class="py-2 bg-white/5 rounded-xl text-xs font-bold hover:bg-white/10">X (Twitter)</button>
                <button onclick="linkAccount('github')" class="py-2 bg-white/5 rounded-xl text-xs font-bold hover:bg-white/10">GitHub</button>
            </div>
        </div>
    </div>

    <div id="receive-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 fade-in">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full text-center border border-emerald-500/30">
            <h3 class="text-xl font-black mb-2 text-white">Receive Assets</h3>
            <p class="text-xs text-gray-400 mb-6">Arc Network (Testnet) Only</p>
            
            <div class="bg-black/60 p-4 rounded-2xl mb-6">
                <p id="modal-address" class="font-mono text-xs text-emerald-400 break-all"></p>
            </div>
            
            <button onclick="copyAddress()" class="w-full py-4 arc-btn-gradient text-black font-black rounded-2xl mb-3">COPY ADDRESS</button>
            <button onclick="closeReceiveModal()" class="w-full py-3 bg-white/5 rounded-2xl text-xs font-bold">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { 
            getAuth, signInWithPopup, GoogleAuthProvider, TwitterAuthProvider, GithubAuthProvider,
            signInWithEmailAndPassword, createUserWithEmailAndPassword, linkWithPopup
        } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzARRpSAQfoFryH4hGQem32kQ5XqEEmQI",
            authDomain: "arcvault-cc843.firebaseapp.com",
            projectId: "arcvault-cc843",
            appId: "1:524225470861:web:f69d672925effc78d11dc4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        
        // --- 🗣️ AI METRO VOICE SYSTEM ---
        window.playMetroVoice = function(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop current speech
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.95; // Metro announcement speed
                msg.pitch = 1.05;
                window.speechSynthesis.speak(msg);
            }
        };

        // --- AUTHENTICATION ---
        window.login = async (pName) => {
            playMetroVoice("Initiating secure login.");
            let p;
            if(pName === 'google') p = new GoogleAuthProvider();
            if(pName === 'twitter') p = new TwitterAuthProvider();
            if(pName === 'github') p = new GithubAuthProvider();
            
            try {
                const res = await signInWithPopup(auth, p);
                showWallet(res.user);
            } catch (e) { alert("Identity Error: " + e.message); }
        };

        window.loginEmailPhone = async () => {
            const input = prompt("Enter Email or Mobile:");
            const pw = prompt("Enter Password:");
            if (input && pw) {
                try {
                    const res = await signInWithEmailAndPassword(auth, input, pw);
                    showWallet(res.user);
                } catch (e) {
                    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-email') {
                        const reg = await createUserWithEmailAndPassword(auth, input, pw);
                        showWallet(reg.user);
                    } else { alert("Login failed."); }
                }
            }
        };

        // --- ACCOUNT BINDING (ANTI-HACK) ---
        window.linkAccount = async (pName) => {
            const user = auth.currentUser;
            if (!user) return;
            
            playMetroVoice("Requesting account link.");
            let p;
            if(pName === 'google') p = new GoogleAuthProvider();
            if(pName === 'twitter') p = new TwitterAuthProvider();
            if(pName === 'github') p = new GithubAuthProvider();

            try {
                await linkWithPopup(user, p);
                playMetroVoice(pName + " account successfully linked for backup.");
                alert(`Success! You can now log in using your ${pName} account to access this same wallet.`);
            } catch (e) {
                if (e.code === 'auth/credential-already-in-use') {
                    playMetroVoice("Error. This account is already tied to another vault.");
                    alert("This account is already linked to a different wallet.");
                } else {
                    console.error(e);
                }
            }
        };

        // --- RECEIVE MODAL LOGIC ---
        window.openReceiveModal = () => {
            document.getElementById('receive-modal').classList.remove('hidden');
            document.getElementById('modal-address').innerText = document.getElementById('wallet-address').innerText;
            playMetroVoice("Receive panel opened.");
        };

        window.closeReceiveModal = () => {
            document.getElementById('receive-modal').classList.add('hidden');
        };

        window.copyAddress = () => {
            const addr = document.getElementById('modal-address').innerText;
            navigator.clipboard.writeText(addr);
            playMetroVoice("Vault address successfully copied to clipboard.");
        };

        // --- WALLET INITIALIZATION ---
        function showWallet(user) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('app-header').classList.add('hidden');
            document.getElementById('wallet-ui').classList.remove('hidden');
            createModularWallet(user.uid);
        }

        async function createModularWallet(uid) {
            const log = document.getElementById('diagnostic-log');
            const msg = document.getElementById('diag-msg');
            const addressBox = document.getElementById('wallet-address');

            try {
                const res = await fetch('/api/wallet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, action: 'create' })
                });
                
                const d = await res.json();
                
                if (!res.ok) {
                    log.classList.remove('hidden');
                    msg.innerHTML = `Error ${res.status}: ${d.message || JSON.stringify(d)}`;
                    addressBox.innerText = "Protocol Connection Error";
                    return;
                }

                if (d.data && d.data.wallets) {
                    addressBox.innerText = d.data.wallets[0].address;
                    addressBox.classList.replace('text-gray-400', 'text-emerald-400');
                    playMetroVoice("Welcome to Arc Vault. Your modular smart account is online.");
                }
            } catch (err) {
                addressBox.innerText = "Network Error.";
            }
        }
    </script>
</body>
</html>
