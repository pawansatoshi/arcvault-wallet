<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArcVault | Modular Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .arc-gradient { background: linear-gradient(135deg, #00FFA3 0%, #0075FF 100%); transition: 0.3s; }
        .arc-gradient:active { transform: scale(0.95); opacity: 0.8; }
        .shimmer { background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div id="auth-ui" class="w-full max-w-md text-center">
        <div class="mb-10">
            <h1 class="text-5xl font-extrabold tracking-tighter italic arc-gradient bg-clip-text text-transparent">ArcVault</h1>
            <p class="text-gray-500 font-semibold uppercase tracking-widest text-[10px] mt-2">Modular Social Infrastructure</p>
        </div>
        
        <div class="glass rounded-[32px] p-8 space-y-4 shadow-2xl">
            <button onclick="login('google')" class="w-full py-4 glass rounded-2xl flex items-center justify-center space-x-3 hover:bg-white/5 active:scale-95 transition-all">
                <span class="font-bold">Sign in with Google</span>
            </button>
            <button onclick="login('twitter')" class="w-full py-4 glass rounded-2xl flex items-center justify-center space-x-3 hover:bg-white/5 active:scale-95 transition-all">
                <span class="font-bold">Sign in with X</span>
            </button>
        </div>
    </div>

    <div id="wallet-ui" class="hidden w-full max-w-md space-y-6">
        <div class="glass rounded-[45px] p-10 text-center relative overflow-hidden shadow-2xl">
            <div class="absolute top-6 right-6"><span class="text-[9px] arc-gradient px-3 py-1 rounded-full text-black font-extrabold tracking-tighter">MODULAR SCA</span></div>
            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-2">Portfolio Value</p>
            <h2 class="text-6xl font-extrabold tracking-tighter">$0.00</h2>
            <div class="mt-6 inline-block glass px-4 py-2 rounded-2xl">
                <p id="wallet-address" class="text-[10px] text-gray-500 font-mono break-all leading-relaxed">Configuring Smart Account...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button class="py-6 arc-gradient text-black font-black rounded-[28px] text-lg shadow-[0_20px_40px_rgba(0,255,163,0.2)]">SEND</button>
            <button class="py-6 glass font-black rounded-[28px] text-lg uppercase">Receive</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, TwitterAuthProvider } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // 🔥 IMPORTANT: REPLACE THIS WITH YOUR REAL CONFIG FROM FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "arcvault-cc843.firebaseapp.com",
            projectId: "arcvault-cc843",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async (providerName) => {
            const provider = providerName === 'google' ? new GoogleAuthProvider() : new TwitterAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                showWallet(result.user);
            } catch (error) {
                alert("Login Error: " + error.message);
            }
        };

        function showWallet(user) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('wallet-ui').classList.remove('hidden');
            createModularWallet(user.uid);
        }

        async function createModularWallet(uid) {
            try {
                const res = await fetch('/api/wallet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, action: 'create' })
                });
                const data = await res.json();
                // Circle returns wallet address inside data.data.wallets[0].address
                if (data.data && data.data.wallets) {
                    document.getElementById('wallet-address').innerText = data.data.wallets[0].address;
                }
            } catch (err) {
                document.getElementById('wallet-address').innerText = "Error creating wallet. Check Vercel Logs.";
            }
        }
    </script>
</body>
</html>
