<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>ArcVault OS v16.0 - Gateway Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <style>
        :root{--arc-main:#00FFA3;--arc-sec:#0075FF;--bg-panel:rgba(255,255,255,0.03)} body{font-family:'Plus Jakarta Sans',sans-serif;background-color:#000;color:#fff;-webkit-font-smoothing:antialiased;background-image:radial-gradient(circle at 50% -20%,#1a1a1a 0%,#000 60%);min-height:100vh;overflow-x:hidden;margin:0;padding:0} .glass{background:var(--bg-panel);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.08)} .arc-btn-gradient{background:linear-gradient(135deg,var(--arc-main) 0%,var(--arc-sec) 100%);transition:0.2s} .text-gradient{background:linear-gradient(135deg,#fff 30%,rgba(255,255,255,0.5) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent} .action-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;width:65px;height:65px;border-radius:16px;background:rgba(255,255,255,0.05);cursor:pointer;transition:0.2s;border:1px solid transparent} .action-btn:hover{background:rgba(255,255,255,0.1);border-color:var(--arc-main);transform:translateY(-2px)} input,select,textarea{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);color:white;padding:12px;border-radius:12px;width:100%;outline:none;transition:0.2s} .fade-in{animation:fadeIn 0.4s ease-out forwards} @keyframes fadeIn{from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)}} ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:4px} .edu-node{transition:all 0.3s ease;border-left:2px solid #333;padding-left:12px;position:relative;margin-bottom:16px;opacity:0.4} .edu-node:last-child{border-left:2px solid transparent} .edu-node::before{content:'';position:absolute;left:-5px;top:0;width:8px;height:8px;border-radius:50%;background:#333;transition:0.3s} .edu-node.active{opacity:1;border-left-color:var(--arc-main)} .edu-node.active::before{background:var(--arc-main);box-shadow:0 0 10px var(--arc-main)} .edu-node.completed{opacity:1;border-left-color:#0075FF} .edu-node.completed::before{background:#0075FF} .edu-node.failed{opacity:1;border-left-color:#EF4444} .edu-node.failed::before{background:#EF4444;box-shadow:0 0 10px #EF4444}
    </style>
</head>
<body class="flex flex-col items-center justify-start pt-[60px] pb-10 px-4 sm:px-8">

    <audio id="bg-music" preload="auto"></audio>

    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black fade-in">
        <h1 class="text-4xl font-extrabold text-gradient mb-8 italic">ArcVault OS</h1>
        <button onclick="startExperience()" class="py-4 px-10 arc-btn-gradient rounded-full text-black font-black uppercase tracking-widest animate-pulse">Initialize System</button>
    </div>

    <div id="wallet-ui" class="hidden w-full max-w-md space-y-4 pb-10 fade-in mt-10">
        <div class="flex justify-between items-center px-2">
            <span class="font-extrabold text-gradient text-sm uppercase italic leading-none">ArcVault OS</span>
            <div class="flex items-center space-x-2">
                <button onclick="logoutApp()" class="text-[9px] font-bold text-red-400 border border-red-500/20 px-2 py-1 rounded-lg hover:bg-red-500/20 transition uppercase tracking-wider">Logout</button>
            </div>
        </div>

        <div class="glass rounded-[32px] p-6 text-center relative shadow-2xl border-t border-white/10">
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-4">Total Valuation</p>
            <h2 id="total-balance" class="text-5xl font-extrabold italic mb-4 tracking-tighter">$0.00</h2>
            <div class="bg-black/60 border border-white/5 p-3 rounded-2xl w-full mb-4 flex justify-between items-center cursor-pointer" onclick="copyElementText(document.getElementById('wallet-address').innerText)">
                <p id="wallet-address" class="text-[10px] font-mono text-emerald-400 truncate w-full text-left mr-2">Syncing Vault...</p>
                <span class="text-xs opacity-50">📋</span>
            </div>
        </div>

        <div class="glass rounded-3xl p-5">
            <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                <select id="network-selector" onchange="changeNetwork()" class="bg-transparent text-emerald-400 font-bold text-[10px] border-none w-full uppercase cursor-pointer tracking-widest outline-none">
                    <option value="arc">Arc Network (Source)</option>
                    <option value="arb-sepolia">Arbitrum Sepolia (Dest)</option>
                </select>
            </div>
            <div id="asset-container" class="space-y-2"></div>
        </div>
    </div>

    <div id="terminal-modal" class="hidden fixed inset-0 z-[160] flex items-center justify-center bg-black/95 p-4 fade-in">
        <div class="glass rounded-[38px] p-6 max-w-sm w-full border border-gray-500/30 flex flex-col">
            <h3 id="term-title" class="text-xl font-black mb-4 text-center italic text-white">Live Execution Terminal</h3>
            <div id="term-nodes" class="flex-1 bg-black/50 border border-white/10 rounded-2xl p-4 mb-4 overflow-y-auto"></div>
            <div id="term-success-panel" class="hidden text-center mb-4">
                <p id="term-final-hash" class="text-[8px] font-mono text-emerald-400 mb-2 break-all"></p>
                <a id="term-track-btn" href="#" target="_blank" class="w-full block py-3 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-emerald-500/40 transition">Track on Explorer</a>
                <p class="text-[10px] text-gray-400 mt-3 font-bold">Relayers are securely routing your funds to Arbitrum.</p>
            </div>
            <button id="term-close-btn" onclick="closeModal('terminal-modal'); fetchLiveBalances();" class="w-full py-3 bg-white/10 rounded-xl font-bold text-[10px] uppercase hover:bg-white/20 transition opacity-50 pointer-events-none">Transaction In Progress...</button>
        </div>
    </div>

    <div id="bridge-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-4 fade-in">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full border border-orange-500/30">
            <h3 class="text-xl font-black mb-6 text-center italic text-orange-400">Arc Gateway Bridge</h3>
            <div id="bridge-form">
                <div class="bg-black/50 p-3 rounded-xl border border-white/10 mb-4">
                    <div class="flex justify-between items-center text-xs text-white font-bold mb-1">
                        <span id="bridge-source-label">From: Arc Testnet</span><span id="bridge-dest-label" class="text-orange-400">To: Arb Sepolia</span>
                    </div>
                </div>
                <input type="text" id="bridge-target-address" placeholder="Destination Address (0x...)" class="mb-4 text-[10px] font-mono w-full bg-black/50 border border-white/10 rounded-xl p-3 text-white outline-none">
                <select id="bridge-asset" class="mb-4 text-xs font-bold w-full bg-transparent border-b border-white/10 outline-none p-2 pointer-events-none appearance-none"><option value="USDC">Native Arc USDC</option></select>
                <input type="number" id="bridge-amount" placeholder="0.00" class="mb-6 text-3xl font-bold text-center w-full bg-black/50 border border-white/10 rounded-2xl p-4 outline-none">
                
                <button id="execute-btn" onclick="startGatewayMachine()" class="w-full py-4 bg-orange-600 font-black rounded-2xl hover:bg-orange-500 shadow-[0_0_20px_rgba(249,115,22,0.4)] uppercase tracking-widest">Send to Gateway</button>
                <button id="resume-btn" onclick="startGatewayMachine()" class="hidden w-full py-4 bg-emerald-600 font-black rounded-2xl hover:bg-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.4)] uppercase tracking-widest">Resume Pending Bridge</button>
                <button onclick="closeModal('bridge-modal')" class="w-full py-3 opacity-50 text-xs mt-2 hover:opacity-100 transition">Cancel</button>
            </div>
        </div>
    </div>

    <div id="error-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 fade-in">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full text-center border border-red-500/50 bg-red-900/10">
            <div class="text-3xl mb-2">⚠️</div>
            <h3 class="text-xl font-black mb-1 uppercase">System Diagnostic</h3>
            <p id="error-msg" class="text-xs text-red-300 mb-4 bg-red-900/40 p-3 rounded-xl border border-red-500/20 break-words font-bold"></p>
            <button onclick="closeModal('error-modal')" class="w-full py-4 bg-white/10 hover:bg-white/20 text-white font-black rounded-2xl transition">Acknowledge</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // ADD YOUR FIREBASE CONFIG HERE
        const firebaseConfig = { apiKey: "AIzaSyCzARRpSAQfoFryH4hGQem32kQ5XqEEmQI", authDomain: "arcvault-cc843.firebaseapp.com", projectId: "arcvault-cc843", appId: "1:524225470861:web:f69d672925effc78d11dc4" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.setView = function(viewId) { document.getElementById('splash-screen').classList.add('hidden'); document.getElementById('wallet-ui').classList.add('hidden'); document.getElementById(viewId).classList.remove('hidden'); };
        window.closeModal = (id) => { document.getElementById(id).classList.add('hidden'); };
        window.copyElementText = (text) => { navigator.clipboard.writeText(text); };

        window.openBridgeModal = (e, symbol) => { 
            e.stopPropagation(); 
            document.getElementById('bridge-asset').value = symbol || 'USDC'; 
            document.getElementById('bridge-target-address').value = document.getElementById('wallet-address').innerText; 
            
            const state = loadState();
            if (state && state.step && state.step !== "DONE") {
                document.getElementById('execute-btn').classList.add('hidden');
                document.getElementById('resume-btn').classList.remove('hidden');
                document.getElementById('bridge-amount').value = state.amount || "";
            } else {
                document.getElementById('execute-btn').classList.remove('hidden');
                document.getElementById('resume-btn').classList.add('hidden');
            }
            document.getElementById('bridge-modal').classList.remove('hidden'); 
        };

        window.changeNetwork = () => {
            const net = document.getElementById('network-selector').value; const container = document.getElementById('asset-container');
            let sym = "USDC";
            let htmlStr = `<div class="glass p-3 rounded-2xl flex justify-between items-center border border-white/5 mb-2 hover:bg-white/10 transition cursor-pointer"><div class="flex items-center space-x-3"><div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-[10px] text-white">US</div><div class="text-left flex flex-col items-start"><p class="text-sm font-bold text-white flex items-center gap-2">${sym}</p></div></div><div class="text-right"><p class="font-mono font-bold text-emerald-400" id="bal-${sym}">0.00</p><div class="flex space-x-2 mt-1 justify-end items-center">`;
            if(net === 'arc') {
                const state = loadState();
                if (state && state.step && state.step !== "DONE") {
                   htmlStr += `<button onclick="openBridgeModal(event, '${sym}')" class="text-[8px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded uppercase font-bold tracking-widest shadow-[0_0_10px_rgba(16,185,129,0.3)] animate-pulse">Resume Bridge</button>`;
                } else {
                   htmlStr += `<button onclick="openBridgeModal(event, '${sym}')" class="text-[8px] bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded uppercase font-bold tracking-widest shadow-[0_0_10px_rgba(249,115,22,0.3)]">Bridge Out</button>`;
                }
            }
            htmlStr += `</div></div></div>`;
            container.innerHTML = htmlStr; fetchLiveBalances();
        };

        async function showWallet(user) {
            setView('wallet-ui'); changeNetwork();
            const uid = user.uid; const userRef = doc(db, "users", uid); const userDoc = await getDoc(userRef);
            if (userDoc.exists() && userDoc.data().walletId) { 
                document.getElementById('wallet-address').innerText = userDoc.data().walletAddress; fetchLiveBalances();
            } else { 
                try { const res = await fetch('/api/wallet', { method: 'POST', body: JSON.stringify({ userId: uid }) }); const cw = await res.json(); await setDoc(userRef, { walletAddress: cw.data.wallets[0].address, walletId: cw.data.wallets[0].id }, { merge: true }); document.getElementById('wallet-address').innerText = cw.data.wallets[0].address; fetchLiveBalances(); } catch(e){} 
            }
        }

        window.fetchLiveBalances = async () => {
            const uid = auth.currentUser?.uid; if(!uid) return; const snap = await getDoc(doc(db, "users", uid)); const wId = snap.data()?.walletId; if(!wId) return;
            const net = document.getElementById('network-selector').value; let blockchainParam = net === 'arb-sepolia' ? 'ARB-SEPOLIA' : 'ARC-TESTNET';
            try {
                const res = await fetch('/api/balance', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ walletId: wId, blockchain: blockchainParam }) }); 
                let data = await res.json();
                if(data?.data?.tokenBalances) { data.data.tokenBalances.forEach(t => { 
                    const el = document.getElementById(`bal-${t.token.symbol}`); if(el) el.innerText = parseFloat(t.amount).toFixed(2);
                }); }
            } catch(e) {}
        };

        window.Term = {
            show: (title) => {
                document.getElementById('terminal-modal').classList.remove('hidden'); document.getElementById('term-title').innerText = title; document.getElementById('term-nodes').innerHTML = ''; document.getElementById('term-success-panel').classList.add('hidden');
                document.getElementById('term-close-btn').classList.add('opacity-50', 'pointer-events-none'); document.getElementById('term-close-btn').innerText = "Transaction In Progress...";
            },
            setSteps: (steps) => {
                let html = ''; steps.forEach((s, i) => { html += `<div id="node-${i}" class="edu-node"><p class="text-[10px] font-bold text-white uppercase tracking-widest">${s}</p><p class="text-[8px] text-gray-400 mt-1">Status: <span id="status-${i}" class="font-mono text-gray-500">Waiting...</span></p></div>`; }); document.getElementById('term-nodes').innerHTML = html;
            },
            updateStep: (index, totalSteps, statusText, state) => {
                for(let i=0; i<totalSteps; i++) {
                    const el = document.getElementById(`node-${i}`); const st = document.getElementById(`status-${i}`); if (!el) continue;
                    if (i < index) { el.className = "edu-node completed"; st.innerText = "Completed ✓"; st.className = "font-mono text-emerald-400"; } 
                    else if (i === index) { el.className = `edu-node ${state === 'error' ? 'failed' : 'active'}`; st.innerText = statusText; st.className = `font-mono ${state === 'error' ? 'text-red-400' : 'text-orange-400 animate-pulse'}`; } 
                    else { el.className = "edu-node"; st.innerText = "Waiting..."; st.className = "font-mono text-gray-500"; }
                }
                if(state === 'error' || state === 'failed') { document.getElementById('term-close-btn').classList.remove('opacity-50', 'pointer-events-none'); document.getElementById('term-close-btn').innerText = "Acknowledge Failure"; }
            },
            success: (hash, link) => {
                document.getElementById('term-final-hash').innerText = `Gateway Tx: ${hash}`; document.getElementById('term-track-btn').href = link; document.getElementById('term-success-panel').classList.remove('hidden');
                const btn = document.getElementById('term-close-btn'); btn.classList.remove('opacity-50', 'pointer-events-none'); btn.innerText = "Return to Vault";
            },
            error: (errText) => {
                const btn = document.getElementById('term-close-btn'); btn.classList.remove('opacity-50', 'pointer-events-none'); btn.innerText = "Acknowledge Failure";
                document.getElementById('term-nodes').innerHTML += `<div class="bg-red-500/10 border border-red-500/20 p-4 rounded-xl mt-4 font-mono text-[9px] text-white break-all"><b>FATAL HALT:</b><br><br>${errText}</div>`;
            }
        };

        // ==========================================
        // 🔥 GATEWAY STATE MACHINE (ONLY 3 STEPS NOW)
        // ==========================================
        const STORAGE_KEY = "arcvault_bridge_state";
        function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }
        function saveState(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); changeNetwork(); }
        function clearState() { localStorage.removeItem(STORAGE_KEY); changeNetwork(); }
        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        function updateTerminalUI(stateName) {
            if (stateName === "IDLE" || stateName === "APPROVING") window.Term.updateStep(0, 3, "Approving Gateway...", "active");
            else if (stateName === "APPROVED" || stateName === "SENDING_TO_GATEWAY") window.Term.updateStep(1, 3, "Routing Funds...", "active");
            else if (stateName === "DONE") window.Term.updateStep(2, 3, "Bridged Successfully!", "completed");
        }

        window.startGatewayMachine = async () => {
            const uid = auth.currentUser?.uid; if (!uid) return;
            const snap = await getDoc(doc(db, "users", uid)); const wId = snap.data()?.walletId;

            const amount = document.getElementById('bridge-amount').value.trim();
            const address = document.getElementById('bridge-target-address').value.trim();

            let ctx = loadState();
            if (!ctx || ctx.step === "DONE") {
                if (!amount || isNaN(amount) || amount <= 0) return alert("Enter valid amount > 0");
                ctx = { step: "IDLE", walletId: wId, amount, address };
                saveState(ctx);
            }

            document.getElementById('bridge-modal').classList.add('hidden');
            window.Term.show("Arc Gateway Cross-Chain Transfer");
            window.Term.setSteps(["Approve USDC", "Send to Arc Gateway", "Cross-Chain Relayed"]);

            while (ctx.step !== "DONE") {
                try {
                    updateTerminalUI(ctx.step);
                    ctx = await processGatewayState(ctx);
                    saveState(ctx);
                } catch (e) {
                    console.warn(`[STATE_MACHINE] Paused at ${ctx.step}:`, e);
                    await delay(4000); // Retry logic
                }
            }
            clearState();
        };

        async function processGatewayState(ctx) {
            switch (ctx.step) {
                // STEP 1: APPROVE
                case "IDLE":
                case "APPROVING":
                    const appRes = await fetch('/api/approve', {
                        method: 'POST', headers: {'Content-Type':'application/json'},
                        body: JSON.stringify({ walletId: ctx.walletId, amount: ctx.amount })
                    });
                    const appData = await appRes.json();
                    if (!appData.success) throw new Error("Approve Failed");
                    
                    window.Term.updateStep(0, 3, "Confirming on Blockchain (15s)...", "active");
                    
                    // 🔥 THE FIX: Wait 15 seconds for the blockchain to mine the approve transaction
                    await delay(15000); 
                    
                    window.Term.updateStep(0, 3, "Approved ✓", "completed");
                    return { ...ctx, step: "SENDING_TO_GATEWAY" };

                // STEP 2: SEND TO GATEWAY
                case "APPROVED":
                case "SENDING_TO_GATEWAY":
                    const sendRes = await fetch('/api/burn', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ walletId: ctx.walletId, destinationAddress: ctx.address, amount: ctx.amount })
                    });
                    const sendData = await sendRes.json();
                    if (!sendData.success) throw new Error("Gateway Send Failed");
                    
                    window.Term.updateStep(1, 3, "Sent ✓", "completed");
                    window.Term.updateStep(2, 3, "Relayed ✓", "completed");
                    window.Term.success("Verified by Gateway", `https://console.circle.com/wallets/dev/transactions/${sendData.operationId}`);
                    return { ...ctx, step: "DONE" };
                    
                default:
                    return { ...ctx, step: "DONE" };
            }
        }

        window.startExperience = async () => {
            try {
                const provider = new GoogleAuthProvider();
                signInWithPopup(auth, provider).then(res => {
                    showWallet(res.user);
                }).catch(e => alert(e.message));
            } catch (e) { console.log(e); }
        };
    </script>
</body>
</html>
