<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>ArcVault | Modular Social Wallet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --arc-main: #00FFA3; --arc-sec: #0075FF; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000; 
            color: #fff; 
            -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #000 60%);
            min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .arc-btn-gradient { background: linear-gradient(135deg, var(--arc-main) 0%, var(--arc-sec) 100%); transition: 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .arc-btn-gradient:active { transform: scale(0.96); filter: brightness(1.1); }
        .text-gradient { background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
        
        input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; }
        input:focus { border-color: var(--arc-main); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-8">

    <audio id="bg-music" loop preload="auto">
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
    </audio>

    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black fade-in">
        <h1 class="text-4xl font-extrabold text-gradient mb-8">ArcVault</h1>
        <button onclick="startExperience()" class="py-4 px-10 arc-btn-gradient rounded-full text-black font-black tracking-widest uppercase animate-pulse">
            Initialize
        </button>
    </div>

    <div id="app-header" class="hidden mb-6 text-center fade-in">
        <h1 class="text-3xl font-extrabold tracking-tighter text-gradient">ArcVault</h1>
    </div>

    <div id="auth-ui" class="hidden w-full max-w-sm space-y-4 fade-in">
        <div class="glass rounded-[38px] p-7 space-y-3 shadow-2xl">
            <button onclick="login('google')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/5">Sign in with Google</button>
            <button onclick="login('twitter')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/5 text-gray-300">Sign in with X</button>
            <button onclick="login('github')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/5 text-gray-400">Sign in with GitHub</button>
            
            <div class="flex items-center space-x-3 py-2"><div class="h-[1px] flex-1 bg-white/10"></div><span class="text-[9px] text-gray-600 uppercase">OR</span><div class="h-[1px] flex-1 bg-white/10"></div></div>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="signInEmail()" class="py-3 bg-white/5 rounded-2xl text-xs font-bold text-emerald-400">Sign In (Email)</button>
                <button onclick="signUpEmail()" class="py-3 bg-white/5 rounded-2xl text-xs font-bold text-blue-400">Create Account</button>
            </div>
        </div>
    </div>

    <div id="wallet-ui" class="hidden w-full max-w-md space-y-4 fade-in">
        <div class="flex justify-between px-2 mb-2">
            <button onclick="openWhitelist()" class="text-[10px] text-blue-400 hover:text-blue-300 font-bold uppercase tracking-wider">📒 Address Book</button>
            <div class="space-x-3">
                <button onclick="backupWallet()" class="text-[10px] text-emerald-400 hover:text-emerald-300 font-bold uppercase tracking-wider">💾 Backup</button>
                <button onclick="logoutApp()" class="text-[10px] text-red-400 hover:text-red-300 font-bold uppercase tracking-wider">🚪 Logout</button>
            </div>
        </div>

        <div class="glass rounded-[48px] p-8 text-center relative shadow-[0_30px_60px_rgba(0,0,0,0.5)]">
            <div class="absolute top-6 right-8 flex items-center space-x-1">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                <span class="text-[9px] font-black text-emerald-400 uppercase">Arc Live</span>
            </div>
            
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em] mb-2">Smart Account</p>
            <h2 class="text-5xl font-extrabold tracking-tighter italic mb-6">$0.00</h2>

            <div id="diagnostic-log" class="hidden mb-4 bg-red-500/10 border border-red-500/30 rounded-2xl p-4 text-left font-mono text-[11px] text-red-400 break-all">
                <strong class="text-white">🛰️ Node Diagnostic:</strong>
                <div id="diag-msg" class="mt-1">Initializing...</div>
                <div id="diag-solution" class="mt-2 text-emerald-400 font-bold">Solution: Check connection.</div>
            </div>

            <div class="bg-black/40 border border-white/5 p-3 rounded-2xl w-full">
                <p id="wallet-address" class="text-[10px] font-mono text-gray-400 break-all">Securing vault...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="openSendModal()" class="py-5 arc-btn-gradient text-black font-black rounded-[28px] text-lg uppercase shadow-lg">Send</button>
            <button onclick="openReceiveModal()" class="py-5 glass font-black rounded-[28px] text-lg uppercase">Receive</button>
        </div>
    </div>

    <div id="send-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 fade-in">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full border border-blue-500/30">
            <h3 class="text-xl font-black mb-1 text-white text-center">Send Assets</h3>
            <p class="text-[10px] text-gray-400 mb-6 text-center">Min amount: 0.01 ARC</p>
            
            <div id="send-form">
                <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Recipient (0x... or @username)</label>
                <input type="text" id="send-to" placeholder="e.g. 0x123... or @pawansatoshi" class="mb-4">
                
                <label class="text-[10px] text-gray-500 uppercase font-bold mb-1 block">Amount</label>
                <input type="number" id="send-amount" placeholder="0.00" min="0.01" step="0.01" class="mb-6">
                
                <button onclick="executeSend()" class="w-full py-4 arc-btn-gradient text-black font-black rounded-2xl mb-3">CONFIRM TRANSFER</button>
                <button onclick="closeModal('send-modal')" class="w-full py-3 bg-white/5 rounded-2xl text-xs font-bold">Cancel</button>
            </div>

            <div id="tx-success" class="hidden text-center">
                <div class="w-16 h-16 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">✓</div>
                <h4 class="font-bold mb-2">Transaction Sent</h4>
                <p class="text-[10px] text-gray-400 mb-2">Network ID:</p>
                <div class="bg-black/60 p-3 rounded-xl mb-4 flex items-center justify-between">
                    <span id="tx-id" class="font-mono text-[9px] text-emerald-400 truncate mr-2">0xabc...</span>
                    <button onclick="copyElement('tx-id')" class="text-[10px] bg-white/10 px-2 py-1 rounded">Copy</button>
                </div>
                <button onclick="closeModal('send-modal')" class="w-full py-3 glass rounded-2xl text-xs font-bold">Done</button>
            </div>
        </div>
    </div>

    <div id="whitelist-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 fade-in">
        <div class="glass rounded-[38px] p-6 max-w-sm w-full border border-purple-500/30 max-h-[80vh] flex flex-col">
            <h3 class="text-lg font-black mb-4 text-white text-center">Address Book</h3>
            
            <div id="whitelist-entries" class="flex-1 overflow-y-auto space-y-2 mb-4 bg-black/30 p-2 rounded-xl min-h-[100px]">
                </div>

            <div class="bg-white/5 p-4 rounded-2xl mb-4">
                <input type="text" id="wl-name" placeholder="Name (e.g. John)" class="mb-2 text-xs py-2">
                <input type="text" id="wl-address" placeholder="Address, Email, or X Handle" class="mb-2 text-xs py-2">
                <button onclick="saveContact()" class="w-full py-2 bg-purple-500/20 text-purple-300 rounded-xl text-xs font-bold border border-purple-500/30">Add Contact +</button>
            </div>

            <button onclick="closeModal('whitelist-modal')" class="w-full py-3 bg-white/10 rounded-2xl text-xs font-bold">Close</button>
        </div>
    </div>

    <div id="receive-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full text-center border border-emerald-500/30">
            <h3 class="text-xl font-black mb-6 text-white">Your Public Address</h3>
            <div class="bg-black/60 p-4 rounded-2xl mb-6">
                <p id="modal-address" class="font-mono text-xs text-emerald-400 break-all"></p>
            </div>
            <button onclick="copyElement('modal-address')" class="w-full py-4 arc-btn-gradient text-black font-black rounded-2xl mb-3">COPY</button>
            <button onclick="closeModal('receive-modal')" class="w-full py-3 bg-white/5 rounded-2xl text-xs font-bold">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, TwitterAuthProvider, GithubAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzARRpSAQfoFryH4hGQem32kQ5XqEEmQI",
            authDomain: "arcvault-cc843.firebaseapp.com",
            projectId: "arcvault-cc843",
            appId: "1:524225470861:web:f69d672925effc78d11dc4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 🗣️ AI VOICE ENGINE ---
        let synth = window.speechSynthesis;
        window.playCustomVoice = function(text) {
            if (!synth) return;
            synth.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.85; msg.pitch = 1.0;
            const voices = synth.getVoices();
            msg.voice = voices.find(v => v.name.includes('Female') || v.name.includes('UK')) || voices[0];
            synth.speak(msg);
        };

        window.startExperience = () => {
            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('app-header').classList.remove('hidden');
            document.getElementById('bg-music').volume = 0.15;
            document.getElementById('bg-music').play().catch(()=>{});
            
            playCustomVoice("Welcome to Arc Vault. A secure modular account built on the Arc Network. Log in to access your vault.");
            
            onAuthStateChanged(auth, (user) => {
                if (user) { showWallet(user); } 
                else { document.getElementById('auth-ui').classList.remove('hidden'); }
            });
        };

        // --- AUTHENTICATION & SIGN UP ---
        window.login = async (pName) => {
            playCustomVoice(`Connecting to ${pName}.`);
            let p = pName === 'google' ? new GoogleAuthProvider() : pName === 'twitter' ? new TwitterAuthProvider() : new GithubAuthProvider();
            try { await signInWithPopup(auth, p); } catch (e) { showError(e.message, "Try another login method."); }
        };

        window.signInEmail = async () => {
            const email = prompt("Enter your Email:");
            const pw = prompt("Enter your Password:");
            if (email && pw) {
                try {
                    const res = await signInWithEmailAndPassword(auth, email, pw);
                    if(!res.user.emailVerified) {
                        alert("Please check your email and verify your account first.");
                        playCustomVoice("Email not verified. Check your inbox.");
                        signOut(auth);
                    }
                } catch (e) { showError(e.message, "Ensure email and password are correct."); }
            }
        };

        window.signUpEmail = async () => {
            const email = prompt("Enter a New Email to Sign Up:");
            const pw = prompt("Create a Secure Password (min 6 chars):");
            if (email && pw) {
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, pw);
                    await sendEmailVerification(res.user);
                    alert("Success! A free verification link has been sent to your email. Please click it before logging in.");
                    playCustomVoice("Registration complete. Please verify your email before accessing the vault.");
                    signOut(auth); // Log them out until they verify
                } catch (e) { showError(e.message, "Password might be too weak or email already in use."); }
            }
        };

        window.logoutApp = async () => {
            await signOut(auth);
            playCustomVoice("Securely logged out.");
            location.reload(); // Hard reset UI
        };

        // --- SEND MODULE ---
        window.openSendModal = () => {
            document.getElementById('send-modal').classList.remove('hidden');
            document.getElementById('send-form').classList.remove('hidden');
            document.getElementById('tx-success').classList.add('hidden');
            playCustomVoice("Transfer module ready. Please enter recipient and amount.");
        };

        window.executeSend = () => {
            const to = document.getElementById('send-to').value;
            const amt = parseFloat(document.getElementById('send-amount').value);
            
            if (!to) return alert("Enter a recipient address or username.");
            if (!amt || amt < 0.01) {
                playCustomVoice("Transaction declined. Amount does not meet the minimum requirement.");
                return alert("Minimum amount is 0.01");
            }

            playCustomVoice(`Processing transfer of ${amt} assets.`);
            document.getElementById('send-form').classList.add('hidden');
            
            // Simulate API Delay
            setTimeout(() => {
                document.getElementById('tx-success').classList.remove('hidden');
                document.getElementById('tx-id').innerText = "0x" + Math.random().toString(16).slice(2, 40) + "arc" + Date.now();
                playCustomVoice("Transaction successful. Receipt generated.");
            }, 2000);
        };

        // --- ADDRESS BOOK (WHITELIST) ---
        window.openWhitelist = async () => {
            document.getElementById('whitelist-modal').classList.remove('hidden');
            playCustomVoice("Address book opened.");
            await loadContacts();
        };

        async function loadContacts() {
            const uid = auth.currentUser.uid;
            const docSnap = await getDoc(doc(db, "users", uid));
            const listDiv = document.getElementById('whitelist-entries');
            listDiv.innerHTML = "";

            if (docSnap.exists() && docSnap.data().contacts) {
                const contacts = docSnap.data().contacts;
                if(contacts.length === 0) listDiv.innerHTML = '<p class="text-[10px] text-gray-500 text-center mt-4">No contacts saved.</p>';
                
                contacts.forEach(c => {
                    listDiv.innerHTML += `
                        <div class="bg-white/5 p-2 rounded flex justify-between items-center border border-white/5">
                            <div>
                                <p class="text-xs font-bold text-white">${c.name} <span class="text-yellow-400 ml-1">★</span></p>
                                <p class="text-[9px] text-gray-400 font-mono">${c.address}</p>
                            </div>
                            <button onclick="document.getElementById('send-to').value='${c.address}'; closeModal('whitelist-modal'); openSendModal();" class="text-[9px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded">Send</button>
                        </div>
                    `;
                });
            } else {
                listDiv.innerHTML = '<p class="text-[10px] text-gray-500 text-center mt-4">No contacts saved.</p>';
            }
        }

        window.saveContact = async () => {
            const name = document.getElementById('wl-name').value;
            const addr = document.getElementById('wl-address').value;
            if(!name || !addr) return alert("Fill both fields.");

            const uid = auth.currentUser.uid;
            await updateDoc(doc(db, "users", uid), {
                contacts: arrayUnion({ name: name, address: addr })
            }).catch(async (e) => {
                // If doc doesn't exist yet, create it
                await setDoc(doc(db, "users", uid), { contacts: [{ name: name, address: addr }] }, { merge: true });
            });

            document.getElementById('wl-name').value = "";
            document.getElementById('wl-address').value = "";
            playCustomVoice("Contact securely saved to your address book.");
            loadContacts();
        };

        // --- UTILS ---
        window.openReceiveModal = () => {
            document.getElementById('receive-modal').classList.remove('hidden');
            document.getElementById('modal-address').innerText = document.getElementById('wallet-address').innerText;
            playCustomVoice("Receive panel opened.");
        };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.copyElement = (id) => {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            playCustomVoice("Copied to clipboard.");
        };
        window.backupWallet = () => {
            const addr = document.getElementById('wallet-address').innerText;
            const blob = new Blob([`ArcVault Backup\nID: ${auth.currentUser.uid}\nAddress: ${addr}`], { type: "text/plain" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "ArcVault_Key.txt"; a.click();
            playCustomVoice("Backup generated.");
        };

        function showError(msg, solution) {
            const log = document.getElementById('diagnostic-log');
            log.classList.remove('hidden');
            document.getElementById('diag-msg').innerText = "Error: " + msg;
            document.getElementById('diag-solution').innerText = "Architect Solution: " + solution;
            playCustomVoice("An error occurred. Please check the diagnostic log for a solution.");
        }

        // --- INITIALIZE WALLET ---
        async function showWallet(user) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('wallet-ui').classList.remove('hidden');
            const addressBox = document.getElementById('wallet-address');

            try {
                const userRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userRef);

                if (userDoc.exists() && userDoc.data().walletAddress) {
                    addressBox.innerText = userDoc.data().walletAddress;
                    addressBox.classList.replace('text-gray-400', 'text-emerald-400');
                    playCustomVoice("Vault unlocked. Secure session active.");
                    return;
                }

                addressBox.innerText = "Generating new vault...";
                const res = await fetch('/api/wallet', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: user.uid, action: 'create' }) });
                const d = await res.json();
                
                if (!res.ok) return showError(d.message || "API Fail", "Check Vercel API Keys.");

                if (d.data && d.data.wallets) {
                    const newAddress = d.data.wallets[0].address;
                    await setDoc(userRef, { walletAddress: newAddress }, { merge: true });
                    addressBox.innerText = newAddress;
                    addressBox.classList.replace('text-gray-400', 'text-emerald-400');
                    playCustomVoice("Vault generated and locked to your database profile.");
                }
            } catch (err) { showError(err.message, "Ensure Firebase Firestore rules are set to Test Mode."); }
        }
    </script>
</body>
</html>
