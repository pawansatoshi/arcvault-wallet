<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>ArcVault | Web3 OS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --arc-main: #00FFA3; --arc-sec: #0075FF; --bg-panel: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; -webkit-font-smoothing: antialiased; background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #000 60%); min-height: 100vh; overflow-x: hidden; margin: 0; padding: 0; }
        .glass { background: var(--bg-panel); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .arc-btn-gradient { background: linear-gradient(135deg, var(--arc-main) 0%, var(--arc-sec) 100%); transition: 0.2s; }
        .arc-btn-gradient:active { transform: scale(0.96); filter: brightness(1.1); }
        .text-gradient { background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); }
        input, select { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; outline: none; transition: 0.2s; }
        .action-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; width: 65px; height: 65px; border-radius: 16px; background: rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s; }
        .action-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); border-color: var(--arc-main); }
        .ticker-wrap { width: 100%; overflow: hidden; background: rgba(0,0,0,0.9); border-bottom: 1px solid rgba(255,255,255,0.1); height: 30px; display: flex; align-items: center; position: fixed; top: 0; z-index: 40; }
        .ticker { display: inline-block; white-space: nowrap; padding-left: 100%; animation: ticker 120s linear infinite; }
        @keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }
        .tick-item { display: inline-flex; align-items: center; margin-right: 2.5rem; font-size: 11px; font-family: monospace; font-weight: bold; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col items-center justify-start pt-12 pb-10 px-4 sm:px-8">

    <div class="ticker-wrap hidden" id="market-ticker-container"><div class="ticker" id="market-ticker"></div></div>
    <audio id="bg-music" loop preload="auto"><source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg"></audio>

    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-black fade-in" onclick="startExperience()">
        <img src="logo.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Arc_logo.svg/1024px-Arc_logo.svg.png'" class="w-24 h-24 mb-6 rounded-2xl shadow-[0_0_40px_rgba(0,255,163,0.2)]">
        <h1 class="text-4xl font-extrabold text-gradient mb-8">ArcVault</h1>
        <button class="py-4 px-10 arc-btn-gradient rounded-full text-black font-black uppercase tracking-widest animate-pulse">Start Identity OS</button>
    </div>

    <div id="auth-ui" class="hidden w-full max-w-sm space-y-4 fade-in mt-10">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold tracking-tighter text-gradient italic">ArcVault</h1>
            <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mt-1">SCA Identity Layer</p>
        </div>
        <div class="glass rounded-[38px] p-7 space-y-3 shadow-2xl relative overflow-hidden">
            <button onclick="login('google')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/10 transition">Sign in with Google</button>
            <button onclick="login('twitter')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/10 text-gray-300 transition">Sign in with X</button>
            <button onclick="login('github')" class="w-full py-3 glass rounded-2xl font-bold text-sm hover:bg-white/10 text-gray-400 transition">Sign in with GitHub</button>
            <div class="flex items-center space-x-3 py-2"><div class="h-[1px] flex-1 bg-white/10"></div><span class="text-[9px] text-gray-600 uppercase">OR</span><div class="h-[1px] flex-1 bg-white/10"></div></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="signInEmail()" class="py-3 bg-white/5 rounded-2xl text-xs font-bold text-emerald-400 transition">Login (Email)</button>
                <button onclick="signUpEmail()" class="py-3 bg-white/5 rounded-2xl text-xs font-bold text-blue-400 transition">Create Account</button>
            </div>
        </div>
    </div>

    <div id="wallet-ui" class="hidden w-full max-w-md space-y-4 fade-in pb-10">
        <div class="flex justify-between items-center px-2 mb-2">
            <div class="flex items-center space-x-2">
                <img src="logo.png" onerror="this.style.display='none'" class="w-8 h-8 rounded-lg">
                <span class="font-extrabold tracking-tighter text-gradient text-sm uppercase italic">ArcVault</span>
            </div>
            <div class="flex items-center space-x-2">
                <button id="music-btn" onclick="toggleMusic()" class="text-sm bg-white/5 p-2 rounded-xl">🎵</button>
                <button onclick="logoutApp()" class="flex items-center space-x-1 bg-red-500/20 px-3 py-2 rounded-xl hover:bg-red-500/40 transition">
                    <span class="text-[10px] font-bold text-red-400 uppercase tracking-wider">Log Out 🚪</span>
                </button>
            </div>
        </div>

        <div class="glass rounded-2xl p-2 flex items-center space-x-2 border border-white/10 hover:border-emerald-500/50 transition bg-black/40">
            <span class="pl-2">🔍</span>
            <input type="text" id="dapp-search" placeholder="Search DApps or URLs..." class="bg-transparent border-none p-2 w-full text-xs text-white shadow-none focus:ring-0" onkeypress="if(event.key === 'Enter') openInAppBrowser(this.value)">
            <button onclick="openInAppBrowser(document.getElementById('dapp-search').value)" class="bg-emerald-500/20 text-emerald-400 px-4 py-2 rounded-xl text-[10px] font-bold uppercase hover:bg-emerald-500/40">GO</button>
        </div>

        <div class="glass rounded-[32px] p-6 text-center relative shadow-2xl border-t border-white/10">
            <div class="absolute top-6 right-6 flex items-center space-x-1 bg-emerald-500/10 px-2 py-1 rounded-full border border-emerald-500/20 cursor-pointer" onclick="fetchLiveBalances(true)">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                <span class="text-[8px] font-black text-emerald-400 uppercase tracking-widest">Live Sync</span>
            </div>
            
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-1">Portfolio Balance</p>
            <h2 id="total-balance" class="text-5xl font-extrabold tracking-tighter italic mb-4">$0.00</h2>
            
            <div class="bg-black/60 border border-white/5 p-3 rounded-2xl w-full mb-6 flex justify-between items-center cursor-pointer hover:bg-black/80 transition" onclick="copyElement('wallet-address')">
                <p id="wallet-address" class="text-[10px] font-mono text-emerald-400 truncate w-full text-left mr-2">Syncing...</p>
                <span class="text-xs opacity-50">📋</span>
            </div>

            <div class="flex justify-between items-center px-1">
                <button onclick="openSendModal('USDC')" class="action-btn">📤<span class="text-[9px] font-bold">SEND</span></button>
                <button onclick="openReceiveModal()" class="action-btn">📥<span class="text-[9px] font-bold">RECEIVE</span></button>
                <button onclick="openHistoryModal()" class="action-btn">📜<span class="text-[9px] font-bold uppercase">Ledger</span></button>
                <button onclick="open2FAModal()" class="action-btn border border-blue-500/30 bg-blue-500/5">🛡️<span class="text-[9px] font-bold text-blue-400">2FA</span></button>
            </div>
        </div>

        <div class="glass rounded-3xl p-5 relative overflow-hidden">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-white/10 relative z-10">
                <h3 class="text-xs font-bold text-white uppercase tracking-widest">Verified Assets</h3>
                <button onclick="openWhitelist()" class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest hover:text-white transition">Address Book 📒</button>
            </div>
            <div id="asset-container" class="space-y-2 relative z-10"></div>
        </div>

        <div class="glass rounded-3xl p-5 border border-white/5">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Identity Bindings</h3>
                <span class="text-[8px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded uppercase font-bold">Multi-Auth Active</span>
            </div>
            <div id="active-connections" class="space-y-2 mb-4"></div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="linkAccount('google')" class="py-2 bg-white/5 rounded-xl text-[10px] font-bold hover:bg-white/10">+ Bind Google</button>
                <button onclick="linkAccount('twitter')" class="py-2 bg-white/5 rounded-xl text-[10px] font-bold hover:bg-white/10">+ Bind X</button>
                <button onclick="linkAccount('github')" class="py-2 bg-white/5 rounded-xl text-[10px] font-bold hover:bg-white/10">+ Bind GitHub</button>
                <button onclick="linkEmailAccount()" class="py-2 bg-emerald-500/10 border border-emerald-500/30 rounded-xl text-[10px] font-bold text-emerald-400 hover:bg-emerald-500/20">+ Bind Email</button>
            </div>
        </div>
    </div>

    <div id="in-app-browser" class="hidden fixed inset-0 z-[100] bg-black flex flex-col fade-in">
        <div class="flex justify-between items-center p-3 border-b border-white/10 bg-black">
            <button onclick="closeInAppBrowser()" class="text-white text-xl font-bold px-2">✕</button>
            <input type="text" id="browser-url" class="bg-white/10 rounded-xl px-4 py-2 text-xs text-white mx-3 flex-1" readonly>
            <button onclick="alert('Connect Request Sent')" class="text-[9px] font-bold uppercase bg-blue-500/20 text-blue-400 px-3 py-2 rounded-xl">WalletConnect</button>
        </div>
        <iframe id="browser-iframe" class="w-full flex-1 border-none bg-white"></iframe>
    </div>

    <div id="2fa-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full text-center border border-blue-500/30">
            <h3 class="text-xl font-black mb-4">Security 2FA</h3>
            <img id="2fa-qr" class="w-48 h-48 mx-auto mb-4 bg-white p-2 rounded-xl" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=ArcVault-Setup-Secret">
            <p class="text-[9px] text-gray-500 uppercase font-bold mb-4">Enter 6-Digit Verification Code</p>
            <input type="text" id="2fa-input" maxlength="6" placeholder="000 000" class="mb-6 text-center text-2xl font-bold tracking-[0.5em] w-full">
            <button onclick="alert('Identity Verified')" class="w-full py-4 arc-btn-gradient text-black font-black rounded-2xl mb-4">ACTIVATE 2FA</button>
            <button onclick="confirm('Reset security? Email verification required.')" class="text-red-400 text-[10px] font-bold uppercase">Reset Option</button>
            <button onclick="closeModal('2fa-modal')" class="block w-full text-center mt-6 text-xs opacity-50">Cancel</button>
        </div>
    </div>

    <div id="send-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full border border-blue-500/30">
            <h3 class="text-xl font-black mb-6 text-center">Transfer Engine</h3>
            <div id="send-form">
                <select id="send-contact-picker" onchange="document.getElementById('send-to').value = this.value" class="mb-4 text-[10px] w-full">
                    <option value="">-- Quick Select Contact --</option>
                </select>
                <input type="text" id="send-to" placeholder="Recipient Address (0x...)" class="mb-4 text-[10px] font-mono">
                <input type="number" id="send-amount" placeholder="0.00" class="mb-6 text-3xl font-bold text-center">
                <button id="exec-btn" onclick="executeTransfer()" class="w-full py-4 bg-blue-600 font-black rounded-2xl mb-2 hover:bg-blue-500 shadow-lg">CONFIRM TRANSACTION</button>
                <button onclick="closeModal('send-modal')" class="w-full py-2 text-xs opacity-50">Cancel</button>
            </div>
            <div id="tx-success" class="hidden text-center">
                <div class="w-16 h-16 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">✓</div>
                <h4 class="font-bold mb-4 uppercase italic">Identity Sync Success</h4>
                <button onclick="closeModal('send-modal')" class="w-full py-4 glass rounded-2xl font-bold">Return to Dashboard</button>
            </div>
        </div>
    </div>

    <div id="whitelist-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
        <div class="glass rounded-[38px] p-6 max-w-sm w-full border border-purple-500/30 flex flex-col max-h-[85vh]">
            <h3 id="list-modal-title" class="text-xl font-black mb-4 text-center italic">OS Records</h3>
            <div id="whitelist-entries" class="overflow-y-auto space-y-2 mb-4 bg-black/30 p-2 rounded-xl flex-1"></div>
            <div id="add-contact-form" class="bg-white/5 p-4 rounded-2xl mb-4 hidden">
                <input type="text" id="wl-name" placeholder="Name" class="mb-2 text-xs">
                <input type="text" id="wl-address" placeholder="0x..." class="mb-2 text-xs">
                <button onclick="saveContact()" class="w-full py-3 bg-purple-500 rounded-xl text-xs font-bold">Save Contact</button>
            </div>
            <button onclick="closeModal('whitelist-modal')" class="w-full py-3 bg-white/10 rounded-2xl text-xs font-bold transition">Close Record</button>
        </div>
    </div>

    <div id="receive-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full text-center border border-emerald-500/30">
            <h3 class="text-xl font-black mb-4">Receive Assets</h3>
            <img id="qr-code-img" class="w-48 h-48 mx-auto mb-4 rounded-xl bg-white p-2">
            <p id="modal-address" class="font-mono text-xs text-emerald-400 break-all bg-black/60 p-3 rounded-xl mb-6"></p>
            <button onclick="copyElement('modal-address')" class="w-full py-4 arc-btn-gradient text-black font-black rounded-2xl">COPY ADDRESS</button>
            <button onclick="closeModal('receive-modal')" class="w-full py-3 opacity-50 text-xs mt-2">Close</button>
        </div>
    </div>

    <div id="error-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4 fade-in">
        <div class="glass rounded-[38px] p-8 max-w-sm w-full text-center border border-red-500/50 bg-red-900/10">
            <div class="text-3xl mb-4">⚠️</div>
            <h3 class="text-xl font-black mb-2">System Alert</h3>
            <p id="error-msg" class="text-xs text-red-300 mb-4 bg-red-900/40 p-3 rounded-xl break-words font-bold"></p>
            <p id="error-solution" class="text-[11px] text-gray-300 mb-6"></p>
            <button onclick="closeModal('error-modal')" class="w-full py-4 bg-white/10 hover:bg-white/20 text-white font-black rounded-2xl transition">Acknowledge</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, TwitterAuthProvider, GithubAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut, EmailAuthProvider, linkWithCredential, linkWithPopup, unlink } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCzARRpSAQfoFryH4hGQem32kQ5XqEEmQI", authDomain: "arcvault-cc843.firebaseapp.com", projectId: "arcvault-cc843", appId: "1:524225470861:web:f69d672925effc78d11dc4" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let synth = window.speechSynthesis;
        let isMusicPlaying = false;
        const bgm = document.getElementById('bg-music');

        window.toggleMusic = () => {
            isMusicPlaying = !isMusicPlaying;
            document.getElementById('music-btn').innerText = isMusicPlaying ? "🔊" : "🔇";
            if(isMusicPlaying) bgm.play().catch(()=>{}); else bgm.pause();
        };

        // --- CRYSTAL MALE VOICE (AUTO-DUCKING) ---
        window.playCustomVoice = function(text) {
            if (!synth) return;
            synth.cancel(); 
            const wasPlaying = isMusicPlaying;
            if(isMusicPlaying) bgm.pause();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.9;
            const voices = synth.getVoices();
            msg.voice = voices.find(v => (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google US English')) && v.lang.startsWith('en')) || voices[0];
            msg.onend = () => { if(wasPlaying) bgm.play().catch(()=>{}); };
            synth.speak(msg);
        };

        window.showError = (msg, solution) => {
            document.getElementById('error-modal').classList.remove('hidden');
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('error-solution').innerText = "Diagnostics: " + solution;
            playCustomVoice("System Alert. " + msg + ". " + solution);
        };
        
        window.copyElement = (id) => { navigator.clipboard.writeText(document.getElementById(id).innerText); playCustomVoice("Copied to clipboard."); };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.open2FAModal = () => { document.getElementById('2fa-modal').classList.remove('hidden'); playCustomVoice("Initialize identity verification."); };

        async function fetchTicker() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=15');
                const data = await res.json();
                const ticker = document.getElementById('market-ticker'); ticker.innerHTML = '';
                data.forEach(c => ticker.innerHTML += `<div class="tick-item"><span>${c.symbol.toUpperCase()} $${c.current_price.toLocaleString()}</span></div>`);
            } catch(e){}
        }

        window.openInAppBrowser = (query) => {
            if(!query) return;
            document.getElementById('in-app-browser').classList.remove('hidden');
            let url = query.includes('.') && !query.includes(' ') ? (query.startsWith('http') ? query : 'https://'+query) : 'https://duckduckgo.com/?q='+encodeURIComponent(query);
            document.getElementById('browser-url').value = url;
            document.getElementById('browser-iframe').src = url;
            playCustomVoice("Secure browser initialized.");
        };
        window.closeInAppBrowser = () => { document.getElementById('in-app-browser').classList.add('hidden'); document.getElementById('browser-iframe').src = ""; };

        // --- ACCOUNT BINDING ENGINE (RESTORED) ---
        function renderLinkedAccounts() {
            const user = auth.currentUser; if (!user) return;
            const container = document.getElementById('active-connections'); container.innerHTML = '';
            user.providerData.forEach((profile) => {
                let pName = profile.providerId.split('.')[0].toUpperCase();
                if(pName === 'PASSWORD') pName = 'EMAIL';
                const details = profile.email || profile.displayName || profile.uid;
                container.innerHTML += `<div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/10 mb-2"><div class="flex items-center space-x-2"><span class="text-[10px] font-black text-emerald-400 bg-emerald-500/20 px-2 py-1 rounded">${pName}</span><span class="text-[10px] text-gray-300 truncate w-32">${details}</span></div><button onclick="unlinkAccount('${profile.providerId}')" class="text-[10px] bg-red-500/20 text-red-400 px-3 py-1 rounded">Disconnect</button></div>`;
            });
        }
        window.linkAccount = async (pName) => {
            let p = pName === 'google' ? new GoogleAuthProvider() : pName === 'twitter' ? new TwitterAuthProvider() : new GithubAuthProvider();
            try { await linkWithPopup(auth.currentUser, p); renderLinkedAccounts(); playCustomVoice("Account bound successfully."); } catch(e) { alert("Failed to bind."); }
        };
        window.unlinkAccount = async (id) => {
            if(auth.currentUser.providerData.length === 1) return alert("Cannot disconnect only login.");
            if(confirm("Disconnect account?")) { await unlink(auth.currentUser, id); renderLinkedAccounts(); playCustomVoice("Account disconnected."); }
        };
        window.linkEmailAccount = async () => {
            const email = prompt("Email:"); const pw = prompt("Password:");
            if(email && pw) { try { await linkWithCredential(auth.currentUser, EmailAuthProvider.credential(email, pw)); renderLinkedAccounts(); } catch(e) { alert("Failed."); } }
        };

        // --- RECOVERY ENGINE (DYNAMIC IDENTITY) ---
        async function showWallet(user) {
            document.getElementById('auth-ui').classList.add('hidden');
            document.getElementById('wallet-ui').classList.remove('hidden');
            renderLinkedAccounts();
            const userRef = doc(db, "users", user.uid);
            const userDoc = await getDoc(userRef);
            
            if (userDoc.exists() && userDoc.data().walletId) {
                const wId = userDoc.data().walletId.replace(/[^a-zA-Z0-9-]/g, '');
                document.getElementById('wallet-address').innerText = userDoc.data().walletAddress;
                fetchLiveBalances(wId);
            } else {
                playCustomVoice("Self-healing recovery engine active.");
                try {
                    const res = await fetch('/api/wallet-recovery', { method: 'POST', body: JSON.stringify({ email: user.email, userId: user.uid }) });
                    const recoveryData = await res.json();
                    if(recoveryData.data) {
                        await setDoc(userRef, { walletAddress: recoveryData.data.address, walletId: recoveryData.data.id }, { merge: true });
                        document.getElementById('wallet-address').innerText = recoveryData.data.address;
                        fetchLiveBalances(recoveryData.data.id);
                    } else {
                        const cRes = await fetch('/api/wallet', { method: 'POST', body: JSON.stringify({ userId: user.uid }) });
                        const d = await cRes.json();
                        const w = d.data.wallets[0];
                        await setDoc(userRef, { walletAddress: w.address, walletId: w.id }, { merge: true });
                        document.getElementById('wallet-address').innerText = w.address;
                        fetchLiveBalances(w.id);
                    }
                } catch(e){ showError("Network Lag", "Restart OS."); }
            }
        }

        window.fetchLiveBalances = async (wId, manual = false) => {
            if(!wId && auth.currentUser) {
                const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
                wId = snap.data()?.walletId?.replace(/[^a-zA-Z0-9-]/g, '');
            }
            if(!wId) return;
            try {
                const res = await fetch('/api/balance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ walletId: wId }) });
                const data = await res.json();
                let usdc = 0;
                if(data.data?.tokenBalances) data.data.tokenBalances.forEach(t => { if(t.token.symbol === 'USDC') usdc = parseFloat(t.amount); });
                document.getElementById('total-balance').innerText = `$${usdc.toFixed(2)}`;
                document.getElementById('asset-container').innerHTML = `<div class="glass p-4 rounded-2xl flex justify-between items-center border border-white/5"><div class="flex items-center space-x-3"><span>🔵</span><p class="text-sm font-bold italic">USD Coin</p></div><p class="font-mono font-bold text-emerald-400">${usdc.toFixed(2)}</p></div>`;
            } catch(e) { if(manual) showError("Sync Issue", e.message); }
        };

        // --- HISTORY & WHITELIST RESTORED ---
        window.openHistoryModal = async () => {
            document.getElementById('whitelist-modal').classList.remove('hidden');
            document.getElementById('add-contact-form').classList.add('hidden');
            document.getElementById('list-modal-title').innerText = "Identity Ledger";
            const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
            const list = document.getElementById('whitelist-entries'); list.innerHTML = "";
            if(snap.exists() && snap.data().txHistory) {
                snap.data().txHistory.reverse().forEach(tx => {
                    list.innerHTML += `<div class="bg-white/5 p-4 rounded-xl border border-white/5 mb-2"><div class="flex justify-between items-center mb-1"><span class="text-[10px] font-black text-blue-400 uppercase">SEND</span><span class="text-[9px] text-gray-500">${new Date(tx.date).toLocaleString()}</span></div><p class="font-bold text-sm text-white">${tx.amount} USDC</p><p class="text-[8px] text-gray-400 truncate">To: ${tx.to}</p><p class="text-[8px] text-emerald-400 font-mono mt-1">ID: ${tx.txId}</p></div>`;
                });
            } else { list.innerHTML = '<p class="text-center text-xs opacity-50 mt-10">Ledger empty.</p>'; }
        };

        window.openWhitelist = async () => {
            document.getElementById('whitelist-modal').classList.remove('hidden');
            document.getElementById('add-contact-form').classList.remove('hidden');
            document.getElementById('list-modal-title').innerText = "Address Book";
            const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
            const list = document.getElementById('whitelist-entries'); list.innerHTML = "";
            if (snap.exists() && snap.data().contacts) {
                snap.data().contacts.forEach(c => {
                    list.innerHTML += `<div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5 mb-2"><div><p class="text-xs font-bold text-white">${c.name}</p><p class="text-[9px] font-mono text-gray-400">${c.address.substring(0,14)}...</p></div><button onclick="document.getElementById('send-to').value='${c.address}'; closeModal('whitelist-modal'); openSendModal();" class="text-[10px] bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded">SELECT</button></div>`;
                });
            }
        };

        window.saveContact = async () => {
            const name = document.getElementById('wl-name').value; const addr = document.getElementById('wl-address').value;
            if(!name || !addr) return;
            await updateDoc(doc(db, "users", auth.currentUser.uid), { contacts: arrayUnion({ name: name, address: addr }) });
            document.getElementById('wl-name').value = ""; document.getElementById('wl-address').value = "";
            openWhitelist();
        };

        window.startExperience = () => {
            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('market-ticker-container').classList.remove('hidden');
            fetchTicker(); setInterval(fetchTicker, 60000);
            setInterval(() => fetchLiveBalances(null, false), 15000);
            playCustomVoice("Welcome, Architect. Identity OS operational.");
            onAuthStateChanged(auth, u => { if(u) showWallet(u); else document.getElementById('auth-ui').classList.remove('hidden'); });
        };

        window.login = (pName) => {
            let p = pName === 'google' ? new GoogleAuthProvider() : pName === 'twitter' ? new TwitterAuthProvider() : new GithubAuthProvider();
            signInWithPopup(auth, p).catch(e => showError("Auth Fail", e.message));
        };
        window.signInEmail = async () => {
            const email = prompt("Email:"); const pw = prompt("Password:");
            if(email && pw) { try { await signInWithEmailAndPassword(auth, email, pw); } catch(e) { showError("Login Failed", e.message); } }
        };
        window.signUpEmail = async () => {
            const email = prompt("New Email:"); const pw = prompt("Password (min 6 chars):");
            if(email && pw) { try { const res = await createUserWithEmailAndPassword(auth, email, pw); await sendEmailVerification(res.user); alert("Verify email!"); signOut(auth); } catch(e){ showError("Signup Failed", e.message); } }
        };
        window.logoutApp = () => signOut(auth).then(() => location.reload());

        window.openSendModal = async () => {
            document.getElementById('send-modal').classList.remove('hidden');
            document.getElementById('send-form').classList.remove('hidden');
            document.getElementById('tx-success').classList.add('hidden');
            const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
            const picker = document.getElementById('send-contact-picker');
            picker.innerHTML = '<option value="">-- Quick Select Contact --</option>';
            if(snap.exists() && snap.data().contacts) { snap.data().contacts.forEach(c => picker.innerHTML += `<option value="${c.address}">${c.name}</option>`); }
        };

        window.executeTransfer = async () => {
            const to = document.getElementById('send-to').value;
            const amt = document.getElementById('send-amount').value;
            const btn = document.getElementById('exec-btn');
            btn.innerText = "SIGNING..."; btn.disabled = true;
            const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
            const wId = snap.data().walletId.replace(/[^a-zA-Z0-9-]/g, '');

            try {
                const res = await fetch('/api/transfer', { method: 'POST', body: JSON.stringify({ walletId: wId, destinationAddress: to, amount: amt }) });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error || data.details?.message);
                await updateDoc(doc(db, "users", auth.currentUser.uid), { txHistory: arrayUnion({ to, amount: amt, txId: data.data.id, date: new Date().toISOString() }) });
                document.getElementById('send-form').classList.add('hidden');
                document.getElementById('tx-success').classList.remove('hidden');
                playCustomVoice("Transaction successful.");
                fetchLiveBalances(wId);
            } catch(e) { showError("Transfer Fail", e.message); }
            finally { btn.innerText = "CONFIRM TRANSACTION"; btn.disabled = false; }
        };

        window.openReceiveModal = () => {
            const addr = document.getElementById('wallet-address').innerText;
            document.getElementById('modal-address').innerText = addr;
            document.getElementById('qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${addr}&color=00FFA3&bgcolor=000000`;
            document.getElementById('receive-modal').classList.remove('hidden');
            playCustomVoice("Identity address ready.");
        };
    </script>
</body>
</html>
